name: Refresh lineups (every 10 min)

on:
  # Off-peak minutes (3,13,23,33,43,53 past) — top-of-hour cron is unreliable on GHA.
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lineups-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run lineups refresh
        run: node refresh-lineups.mjs

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lineups.json
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "lineups refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Retry with rebase to handle concurrent commits from the slates refresh.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0 || {
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            }
          done
          echo "all push attempts failed"
          exit 1
