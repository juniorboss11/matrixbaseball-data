name: Refresh MatrixBaseball slates

on:
  # 17 past every hour. Off-peak minute = much more reliable than `0 * * * *`
  # (GitHub drops scheduled jobs at top of the hour under load).
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-slates
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run refresh script
        run: node refresh-statcast.mjs
      - name: Commit updated slates.json
        run: |
          git config user.name "matrixbaseball-bot"
          git config user.email "matrixbaseball-bot@users.noreply.github.com"
          git add slates.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "refresh slates.json"
          # Retry with rebase to handle concurrent commits from the lineups workflow.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0 || {
              echo "push attempt $i failed, retrying in 5s..."
              sleep 5
            }
          done
          echo "all push attempts failed"
          exit 1
