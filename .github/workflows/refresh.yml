name: Refresh MatrixBaseball slates

on:
  # Every 3 hours during MLB activity hours (10 AM - 1 AM ET = 14-05 UTC).
  # Multiple minute slots per cron line because GitHub Actions drops a lot of
  # scheduled runs on the free tier; firing at several offsets gives the
  # scheduler more chances to actually run.
  schedule:
    - cron: "13,43 14,17,20,23,2,5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-slates
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run refresh script
        run: node refresh-statcast.mjs
      - name: Commit updated slates.json
        run: |
          git config user.name "matrixbaseball-bot"
          git config user.email "matrixbaseball-bot@users.noreply.github.com"
          git add slates.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "refresh slates.json"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || {
                echo "push attempt $i failed, retrying in 5s..."
                sleep 5
              }
            done
          fi
      - name: Update version.json with latest commit SHA
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            SHA=$(git rev-parse HEAD)
            NOW=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            cat > version.json <<EOF
          {
            "latestSha": "${SHA}",
            "updatedAt": "${NOW}",
            "updatedBy": "refresh-statcast"
          }
          EOF
            git add version.json
            if git diff --cached --quiet; then
              echo "version.json already current"
              exit 0
            fi
            git commit -m "version.json: pin ${SHA:0:7}"
            git push && exit 0 || {
              echo "version push attempt $i failed, retrying in 5s..."
              sleep 5
            }
          done
          echo "all version.json push attempts failed"
          exit 1
